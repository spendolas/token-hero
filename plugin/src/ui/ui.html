<!DOCTYPE html>
<html>
<head>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Inter, sans-serif;
      font-size: 11px;
      font-weight: 400;
      line-height: 16px;
      color: #242424;
      background: #ffffff;
      margin: 0;
    }

    /* ── Labels ─────────────────────────────────────────── */

    label {
      font-size: 11px;
      color: #242424;
      opacity: 0.5;
      margin-bottom: 4px;
      display: block;
    }

    /* ── Inputs & Selects ──────────────────────────────── */

    input[type="text"],
    input[type="number"],
    select {
      width: 100%;
      height: 32px;
      border: none;
      border-radius: 4px;
      padding: 0 8px;
      font-family: Inter, sans-serif;
      font-size: 11px;
      font-weight: 400;
      color: #242424;
      background: rgba(36, 36, 36, 0.2);
      outline: none;
      -webkit-appearance: none;
      -moz-appearance: none;
      appearance: none;
    }

    select {
      background-image: url("data:image/svg+xml,%3Csvg width='8' height='5' viewBox='0 0 8 5' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0.5 0.5L4 4L7.5 0.5' stroke='%23242424' stroke-opacity='0.5'/%3E%3C/svg%3E");
      background-repeat: no-repeat;
      background-position: right 10px center;
      padding-right: 26px;
    }

    input[type="text"]::placeholder,
    input[type="number"]::placeholder {
      color: #242424;
      opacity: 0.5;
    }

    input[type="number"]::-webkit-outer-spin-button,
    input[type="number"]::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    input[type="number"] {
      -moz-appearance: textfield;
    }

    input[readonly] {
      opacity: 0.6;
      cursor: default;
    }

    /* ── Segmented control ─────────────────────────────── */

    .segmented {
      display: flex;
      height: 32px;
      border-radius: 4px;
      overflow: hidden;
      background: rgba(36, 36, 36, 0.2);
    }

    .seg-btn {
      flex: 1;
      height: 32px;
      border: none;
      background: transparent;
      color: #242424;
      font-family: Inter, sans-serif;
      font-size: 11px;
      font-weight: 400;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }

    .seg-btn:hover {
      opacity: 0.8;
    }

    .seg-btn.active {
      background: #242424;
      color: #ffffff;
    }

    /* ── Checkbox ───────────────────────────────────────── */

    .checkbox-label {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      user-select: none;
    }

    .checkbox-label input[type="checkbox"] {
      display: none;
    }

    .checkmark {
      width: 20px;
      height: 20px;
      border: 1px solid #242424;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .checkbox-label input[type="checkbox"]:checked + .checkmark {
      background: rgba(36, 36, 36, 0.2);
      border-color: transparent;
    }

    .checkbox-label input[type="checkbox"]:checked + .checkmark::after {
      content: '';
      width: 10px;
      height: 10px;
      background: #242424;
      border-radius: 1px;
    }

    /* ── Layout helpers ─────────────────────────────────── */

    .field {
      display: flex;
      flex-direction: column;
    }

    .split-row {
      display: flex;
      gap: 8px;
    }

    .half {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .hidden {
      display: none;
    }

    /* ── Buttons ────────────────────────────────────────── */

    .btn-primary,
    .btn-secondary {
      width: 100%;
      height: 32px;
      border: none;
      border-radius: 4px;
      font-family: Inter, sans-serif;
      font-size: 11px;
      font-weight: 400;
      cursor: pointer;
    }

    .btn-primary {
      background: #242424;
      color: #ffffff;
    }

    .btn-secondary {
      background: rgba(36, 36, 36, 0.2);
      color: #242424;
    }

    .btn-primary:hover,
    .btn-secondary:hover {
      opacity: 0.9;
    }

    .btn-primary:disabled,
    .btn-secondary:disabled {
      opacity: 0.3;
      cursor: default;
    }

    .button-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    /* ── App layout ────────────────────────────────────── */

    .app {
      display: flex;
      flex-direction: column;
    }

    .app-header {
      flex-shrink: 0;
      padding: 8px 12px 0;
      display: flex;
      flex-direction: column;
      gap: 6px;
      border-bottom: 1px solid rgba(36, 36, 36, 0.1);
    }

    .tab-row {
      display: flex;
      gap: 0;
    }

    .tab-btn {
      flex: 1;
      height: 28px;
      border: none;
      background: transparent;
      color: #242424;
      opacity: 0.5;
      font-family: Inter, sans-serif;
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: opacity 0.15s, border-color 0.15s;
    }

    .tab-btn:hover {
      opacity: 0.8;
    }

    .tab-btn.active {
      opacity: 1;
      border-bottom-color: #242424;
    }

    .tab-content {
      flex: 1;
      overflow-y: auto;
      padding: 10px 12px;
    }

    /* ── Status pill ───────────────────────────────────── */

    .status-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 0 0 6px;
      font-size: 10px;
      opacity: 0.5;
    }

    .status-pill.status-connected {
      opacity: 0.7;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #999;
      flex-shrink: 0;
    }

    .status-dot.dot-connected {
      background: #34c759;
    }

    .status-label {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ── Banner ────────────────────────────────────────── */

    .banner {
      padding: 8px 12px;
      font-size: 11px;
      line-height: 16px;
    }

    .banner-warning {
      background: #fff3cd;
      color: #856404;
    }

    /* ── Field error ───────────────────────────────────── */

    .field-error {
      font-size: 10px;
      color: #ef4444;
      margin-top: 2px;
    }

    /* ── Settings tab ──────────────────────────────────── */

    .settings-tab {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .settings-section {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .section-title {
      font-size: 11px;
      font-weight: 600;
      opacity: 0.7;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* ── Placeholder tab ───────────────────────────────── */

    .placeholder-tab {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      min-height: 200px;
      text-align: center;
      gap: 8px;
    }

    .placeholder-title {
      font-size: 13px;
      font-weight: 500;
      opacity: 0.6;
    }

    .placeholder-desc {
      font-size: 11px;
      opacity: 0.4;
      max-width: 200px;
    }

    /* ── Styles tab ──────────────────────────────────────── */

    .styles-tab {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .styles-loading {
      padding: 32px 0;
      text-align: center;
      opacity: 0.5;
    }

    /* ── Filter bar ──────────────────────────────────────── */

    .filter-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 4px;
    }

    .filter-segmented {
      flex: 1;
      height: 26px;
    }

    .filter-segmented .seg-btn {
      height: 26px;
      font-size: 10px;
    }

    .refresh-indicator {
      border: none;
      background: none;
      font-family: Inter, sans-serif;
      font-size: 10px;
      color: #242424;
      opacity: 0.4;
      cursor: pointer;
      white-space: nowrap;
      padding: 0;
      margin-left: auto;
    }

    .refresh-indicator:hover {
      opacity: 0.7;
    }

    /* ── Section group ───────────────────────────────────── */

    .section-group {
      margin-bottom: 2px;
    }

    .section-header-row {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .section-header {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 0;
      border: none;
      background: none;
      cursor: pointer;
      font-family: Inter, sans-serif;
      font-size: 11px;
      font-weight: 600;
      color: #242424;
      text-align: left;
    }

    .section-header:hover {
      opacity: 0.7;
    }

    .section-chevron {
      width: 10px;
      font-size: 10px;
      opacity: 0.5;
    }

    .section-label {
      flex-shrink: 0;
    }

    .section-badge {
      font-weight: 400;
      font-size: 10px;
      opacity: 0.4;
      margin-left: auto;
    }

    .section-body {
      padding-left: 4px;
    }

    /* ── Token row ───────────────────────────────────────── */

    .token-row {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 2px;
      border: none;
      background: none;
      cursor: pointer;
      font-family: Inter, sans-serif;
      font-size: 10px;
      color: #242424;
      text-align: left;
      border-radius: 3px;
    }

    .token-row:hover {
      background: rgba(36, 36, 36, 0.05);
    }

    .token-row-expanded {
      background: rgba(36, 36, 36, 0.05);
    }

    .token-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .dot-clean { background: #4ade80; }
    .dot-amber { background: #fb923c; }
    .dot-red { background: #f87171; }
    .dot-outline { background: transparent; border: 1.5px solid rgba(36, 36, 36, 0.3); }
    .dot-dim { background: rgba(36, 36, 36, 0.15); }

    .token-name {
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-weight: 500;
    }

    .token-value {
      flex-shrink: 0;
      max-width: 80px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      opacity: 0.6;
      font-size: 10px;
    }

    .token-separator {
      flex-shrink: 0;
      opacity: 0.5;
      font-size: 10px;
    }

    /* ── Token detail ────────────────────────────────────── */

    .token-detail {
      padding: 6px 8px 8px 19px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .detail-row {
      display: flex;
      gap: 8px;
      font-size: 10px;
    }

    .detail-label {
      width: 40px;
      flex-shrink: 0;
      opacity: 0.4;
      font-weight: 500;
    }

    .detail-value {
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .used-by-list {
      opacity: 0.6;
    }

    .btn-push {
      margin-top: 4px;
      height: 24px;
      font-size: 10px;
    }

    .btn-push:not(:disabled) {
      cursor: pointer;
    }

    .btn-push-warning {
      background: rgba(248, 113, 113, 0.15);
      color: #dc2626;
    }

    .btn-push-status {
      font-size: 9px;
      margin-top: 2px;
    }

    .btn-push-status.push-error {
      color: #ef4444;
    }

    .btn-push-status.push-success {
      color: #4ade80;
    }

    .push-all-bar {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding: 2px 0 4px;
    }

    .btn-push-section {
      border: none;
      background: none;
      font-family: Inter, sans-serif;
      font-size: 10px;
      color: #3c8ae8;
      cursor: pointer;
      padding: 0;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .btn-push-section:hover {
      text-decoration: underline;
    }

    .btn-push-section:disabled {
      opacity: 0.3;
      cursor: default;
      text-decoration: none;
    }

    /* ── Field row (input + button side by side) ──────────── */

    .field-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .field-row input[type="text"] {
      flex: 1;
    }

    .field-row .btn-secondary {
      width: auto;
      flex-shrink: 0;
      padding: 0 12px;
    }

    /* ── Tab stale indicator ─────────────────────────────── */

    .tab-stale-indicator {
      opacity: 0.6;
    }

    /* ── Inspector tab ──────────────────────────────────── */

    .inspector-tab {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .inspector-empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 16px;
      text-align: center;
    }

    .inspector-empty-text {
      opacity: 0.5;
      font-size: 11px;
    }

    .inspector-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 0;
    }

    .inspector-component-name {
      flex: 1;
      font-size: 12px;
      font-weight: 600;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .inspector-rescan {
      width: auto;
      flex-shrink: 0;
      padding: 2px 8px;
      font-size: 10px;
    }

    .inspector-mapping-bar {
      font-size: 10px;
      opacity: 0.5;
      padding: 0 0 4px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .inspector-variant-note {
      font-size: 10px;
      opacity: 0.5;
      font-style: italic;
      padding: 0 0 4px;
    }

    .inspector-summary {
      display: flex;
      gap: 12px;
      padding: 4px 0 6px;
      font-size: 10px;
    }

    .inspector-variant-header {
      font-size: 10px;
      font-weight: 600;
      padding: 6px 0 2px;
      opacity: 0.7;
      border-top: 1px solid rgba(0, 0, 0, 0.06);
      margin-top: 4px;
    }

    .inspector-layer {
      margin-bottom: 1px;
    }

    .inspector-layer-header {
      display: flex;
      align-items: center;
      gap: 4px;
      width: 100%;
      padding: 4px 2px;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 11px;
      font-family: inherit;
      color: inherit;
      text-align: left;
    }

    .inspector-layer-header:hover {
      background: rgba(0, 0, 0, 0.04);
      border-radius: 4px;
    }

    .inspector-layer-chevron {
      width: 12px;
      text-align: center;
      opacity: 0.4;
      font-size: 10px;
    }

    .inspector-layer-name {
      flex: 1;
      font-weight: 500;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .inspector-layer-count {
      opacity: 0.4;
      font-size: 10px;
      flex-shrink: 0;
    }

    .inspector-layer-body {
      padding: 0 0 2px;
    }

    .inspector-prop-row {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 2px 2px 2px 20px;
      font-size: 10px;
    }

    .inspector-prop-name {
      width: 72px;
      flex-shrink: 0;
      opacity: 0.5;
      font-weight: 500;
    }

    .inspector-prop-value {
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-family: 'SF Mono', 'Menlo', monospace;
      font-size: 10px;
    }

    .inspector-badge-bound {
      flex-shrink: 0;
      color: #22c55e;
      font-size: 10px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 120px;
    }

    .inspector-badge-unbound {
      flex-shrink: 0;
      opacity: 0.35;
      font-size: 10px;
      white-space: nowrap;
    }

    /* ── Audit tab ───────────────────────────────────────── */

    .audit-tab {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .audit-empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 16px;
      text-align: center;
    }

    .audit-empty-text {
      opacity: 0.5;
      font-size: 11px;
    }

    .audit-summary {
      display: flex;
      gap: 8px;
      align-items: center;
      padding: 4px 0 6px;
      font-size: 10px;
    }

    .audit-summary-count {
      font-weight: 600;
    }

    .audit-summary-fixable {
      color: #22c55e;
    }

    .audit-summary-time {
      opacity: 0.4;
      margin-left: auto;
    }

    .audit-error {
      padding: 4px 8px;
      margin-bottom: 4px;
      border-radius: 4px;
      font-size: 10px;
      background: rgba(248, 113, 113, 0.1);
      color: #ef4444;
    }

    .audit-type-section {
      margin-bottom: 2px;
    }

    .audit-type-header {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .audit-type-toggle {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 5px 2px;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 11px;
      font-family: inherit;
      color: inherit;
      text-align: left;
    }

    .audit-type-toggle:hover {
      background: rgba(0, 0, 0, 0.04);
      border-radius: 4px;
    }

    .audit-type-chevron {
      width: 12px;
      text-align: center;
      opacity: 0.4;
      font-size: 10px;
    }

    .audit-type-label {
      font-weight: 500;
    }

    .audit-type-count {
      opacity: 0.4;
      font-size: 10px;
    }

    .audit-fix-all-btn {
      flex-shrink: 0;
      padding: 2px 8px;
      font-size: 9px;
    }

    .audit-type-body {
      padding: 0 0 4px;
    }

    .audit-finding-row {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 3px 2px 3px 20px;
      font-size: 10px;
    }

    .audit-finding-row:hover {
      background: rgba(0, 0, 0, 0.02);
      border-radius: 4px;
    }

    .audit-finding-info {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 1px;
    }

    .audit-finding-component {
      font-weight: 500;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .audit-finding-layer {
      opacity: 0.5;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .audit-finding-values {
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 1px;
      font-family: 'SF Mono', 'Menlo', monospace;
      font-size: 9px;
      max-width: 100px;
    }

    .audit-finding-expected {
      color: #22c55e;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 100px;
    }

    .audit-finding-actual {
      color: #ef4444;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 100px;
    }

    .audit-finding-value {
      opacity: 0.5;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 100px;
    }

    .audit-finding-action {
      flex-shrink: 0;
      width: 36px;
      text-align: right;
    }

    .audit-fix-btn {
      padding: 1px 6px;
      font-size: 9px;
    }

    .audit-finding-manual {
      opacity: 0.3;
      font-size: 9px;
    }

    .audit-run-btn {
      padding: 4px 16px;
      font-size: 11px;
    }

    .audit-rerun-btn {
      margin-left: auto;
      padding: 2px 8px;
      font-size: 9px;
      flex-shrink: 0;
    }

    /* ── Dark mode ──────────────────────────────────────── */

    @media (prefers-color-scheme: dark) {
      body {
        background: #242424;
        color: #afafaf;
      }

      label {
        color: #afafaf;
      }

      input[type="text"],
      input[type="number"],
      select {
        background-color: #383838;
        color: #afafaf;
      }

      select {
        background-image: url("data:image/svg+xml,%3Csvg width='8' height='5' viewBox='0 0 8 5' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0.5 0.5L4 4L7.5 0.5' stroke='%23afafaf' stroke-opacity='0.5'/%3E%3C/svg%3E");
        background-color: #383838;
      }

      input[type="text"]::placeholder,
      input[type="number"]::placeholder {
        color: #afafaf;
        opacity: 0.5;
      }

      .segmented {
        background: #383838;
      }

      .seg-btn {
        color: #afafaf;
      }

      .seg-btn.active {
        background: #3c8ae8;
        color: #ffffff;
      }

      .checkmark {
        border-color: #808080;
      }

      .checkbox-label input[type="checkbox"]:checked + .checkmark {
        background: #383838;
        border-color: transparent;
      }

      .checkbox-label input[type="checkbox"]:checked + .checkmark::after {
        background: #afafaf;
      }

      .btn-primary {
        background: #3c8ae8;
        color: #ffffff;
      }

      .btn-secondary {
        background: #383838;
        color: #afafaf;
      }

      .app-header {
